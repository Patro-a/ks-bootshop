name: Build JARVIS APK

on:
  push:
    branches: ["claude/jarvis-android-voice-assistant-pVpxO", "master"]
    paths: ["jarvis-android/**"]
  workflow_dispatch:   # lets you trigger it manually from GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Set up Gradle 8.4
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.4"

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT"                          >> jarvis-android/local.properties
          echo "openai.api.key=${{ secrets.OPENAI_API_KEY }}"       >> jarvis-android/local.properties
          echo "elevenlabs.api.key=${{ secrets.ELEVENLABS_API_KEY }}" >> jarvis-android/local.properties

      - name: Build debug APK
        working-directory: jarvis-android
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-debug-apk
          path: jarvis-android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
